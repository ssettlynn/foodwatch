<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Story — FoodWatch</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="plotly.min.js"></script>
<script src="foodwatch_data.js"></script>
<script src="fw.js"></script>
</head>
<body>
<script>fwNav('country.html',false)</script>

<div class="pagehead">
  <img class="bgart" src="assets/market.svg" alt="">
  <div class="wrap">
    <div class="eyebrow" style="color:#FFD86B">Country Story</div>
    <h1>Every country tells a story</h1>
    <p>Fourteen years of data, an auto-written summary, three model forecasts for 2024 —
       and the reasons behind them.</p>
  </div>
</div>

<section>
  <div class="wrap">
    <div class="card rv">
      <div style="display:flex;gap:1.2rem;flex-wrap:wrap;align-items:center">
        <input type="text" id="cSearch" list="cList" placeholder="Type a country — try Myanmar, Kenya, Haiti…" style="flex:1;min-width:280px">
        <datalist id="cList"></datalist>
        <select id="cMetric"></select>
      </div>
      <div id="cStory" style="margin-top:1.6rem"></div>
      <div id="cChart" style="height:380px;margin-top:1rem"></div>
      <div id="cStrip" style="margin-top:1.2rem;line-height:2.4"></div>
    </div>

    <div class="card rv d1" style="margin-top:2rem">
      <div id="cOutlook"></div>
    </div>
  </div>
</section>

<script>fwFooter()</script>
<script>
const dl=document.getElementById('cList');
ISOs.map(i=>FW.META[i].n).sort().forEach(n=>{const o=document.createElement('option');o.value=n;dl.appendChild(o);});
const mSel=document.getElementById('cMetric');
// five forecastable indicators — every selection has an aligned forecast
['pou','gdp_per_capita','inflation_cpi','des_adequacy','pop_growth'].forEach(k=>{
 const o=document.createElement('option');o.value=k;o.textContent=LBL[k];mSel.appendChild(o);});

function showCountry(name){const iso=name2iso[name];if(!iso)return;
 const s=FW.SERIES[iso],m=FW.META[iso],k=mSel.value;
 const first=s.pou.find(v=>v!=null),last=[...s.pou].reverse().find(v=>v!=null);
 const dir=last<first?'improved':'worsened';
 let peakY=s.y[0],peak=-1;s.pou.forEach((v,i)=>{if(v!=null&&v>peak){peak=v;peakY=s.y[i]}});
 const lt=[...s.tier].reverse().find(v=>v);
 document.getElementById('cStory').innerHTML=
  `<h2 style="font-size:1.8rem">${m.n} <span class="badge" style="background:${TC[lt]||'#888'};vertical-align:middle">${lt} — ${MEAN[lt]||''}</span></h2>
   <div class="explain"><b>${m.n}'s story:</b> hunger has <b>${dir}</b> since 2010 (${first}% → ${last}%).
   Hardest year: <b>${peakY}</b>. Region: ${m.r} (${m.g}).</div>`;
 const regAvg=FW.GLOB.years.map(y=>{let sum=0,n=0;ISOs.forEach(c=>{if(FW.META[c].r===m.r){
  const i=FW.SERIES[c].y.indexOf(y);if(i>-1&&FW.SERIES[c][k]&&FW.SERIES[c][k][i]!=null){sum+=FW.SERIES[c][k][i];n++;}}});
  return n?sum/n:null;});
 Plotly.react('cChart',[{x:s.y,y:s[k],name:m.n,mode:'lines+markers',line:{color:'#0F5FA8',width:3}},
  {x:FW.GLOB.years,y:regAvg,name:m.r+' average',line:{color:'#9AA8B5',width:2,dash:'dot'}}],
  {...LAYOUT,yaxis:{title:LBL[k]},legend:{orientation:'h',y:1.12},
   shapes:[2020,2022].map(x=>({type:'line',x0:x,x1:x,y0:0,y1:1,yref:'paper',
    line:{color:TC.High,dash:'dash',width:1}}))},PLOTCFG);
 document.getElementById('cStrip').innerHTML='<b style="font-size:.9rem">Hunger tier, year by year:</b> '+
  s.y.map((y,i)=>s.tier[i]?`<span class="badge" style="background:${TC[s.tier[i]]};font-size:.72rem;margin:2px">${y}</span>`:'').join('');

 const P=FW.PRED[iso],F=(FW.FORE||{})[iso];
 const unit=FW.UNIT[k]||'';
 const fmt=v=>k==='gdp_per_capita'?('$'+Math.round(v).toLocaleString()):(v+unit);
 let html='';
 // ---- v5: forecast ALIGNED to the selected indicator ----
 if(F&&F[k]){const f=F[k];
  html+=`<h2 style="font-size:1.2rem;margin-bottom:.9rem">Where ${m.n}'s ${LBL[k].toLowerCase().replace(/\s*\(.*\)/,'')} is heading</h2>
   <div style="display:flex;gap:.9rem;flex-wrap:wrap">
    <div class="kpi" style="min-width:135px"><div class="l">Now (2023)</div><div class="n">${f.now==null?'—':fmt(f.now)}</div></div>
    <div class="kpi" style="min-width:135px;border-top:3px solid var(--blue)"><div class="l" style="color:var(--blue)">2024 forecast</div><div class="n" style="color:var(--blue)">${fmt(f.y2024)}</div></div>
    <div class="kpi fc" style="min-width:135px"><div class="l" style="color:var(--violet)">2028 outlook</div><div class="n" style="color:var(--violet)">${fmt(f.y2028)}</div></div>
   </div>`;
  // honest, plain-language reliability caveat
  const fm=(FW.FCMETRICS||[]).find(x=>x.ind===k);
  if(fm){const weak=fm.r2_5<0.3;
   html+=`<div class="explain" style="margin-top:.9rem">${weak
    ?'This one is <b>hard to predict</b> far ahead — it jumps around a lot. Take the 2028 number as a rough direction only.'
    :'This forecast is <b>reliable</b> — the number changes slowly, and the model tracked it well on past years.'}</div>`;}
 }
 // ---- risk-tier forecast (always shown; three models) ----
 html+='<h3 style="font-family:var(--sans);font-size:.95rem;margin:1.6rem 0 .7rem">Risk tier next year — do three models agree?</h3>';
 if(P){html+='<div style="display:flex;gap:.9rem;flex-wrap:wrap">';
  [['rf','Random Forest'],['lr','Logistic Regression'],['dt','Decision Tree']].forEach(([kk,nm])=>{
   const p=P[kk];html+=`<div class="kpi" style="min-width:160px"><div class="l">${nm}</div>
    <div style="margin-top:.35rem"><span class="badge" style="background:${TC[p.t]};font-size:.78rem">${p.t}</span>
    <b style="font-size:.85rem"> ${Math.round(p.c*100)}% sure</b></div></div>`;});
  html+='</div>';}
 else html+='<div class="explain">No 2023 data available for a next-year forecast for this country.</div>';
 html+=`<div style="margin-top:1.4rem;display:flex;gap:.7rem;flex-wrap:wrap;align-items:center">
   <a class="btn btn-blue" href="lab.html">Test scenarios →</a>
   <a class="btn" style="border:1.5px solid #D7E0EA" href="modellab.html">How the models work →</a></div>`;
 document.getElementById('cOutlook').innerHTML=html;}
document.getElementById('cSearch').addEventListener('change',e=>showCountry(e.target.value));
mSel.onchange=()=>showCountry(document.getElementById('cSearch').value||'Myanmar');
document.getElementById('cSearch').value='Myanmar';showCountry('Myanmar');
</script>
</body>
</html>
