</g>

<!-- hanging lamps -->
<g>
 <line x1="480" y1="190" x2="480" y2="300" stroke="#3A2410" stroke-width="6"/>
 <circle cx="480" cy="330" r="34" fill="#FFD86B" filter="url(#soft2)"/>
 <line x1="1440" y1="190" x2="1440" y2="280" stroke="#3A2410" stroke-width="6"/>
