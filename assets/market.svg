  <circle cx="735" cy="580" r="20"/><circle cx="660" cy="600" r="20"/><circle cx="712" cy="602" r="19"/></g>
 <g fill="#1A9E77"><circle cx="630" cy="560" r="5"/><circle cx="685" cy="554" r="5"/></g>
</g>
