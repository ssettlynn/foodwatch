<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
 <stop offset="0" stop-color="#B85A22"/><stop offset=".55" stop-color="#D07B33"/>
 <stop offset="1" stop-color="#8F4A1D"/>
</linearGradient>
<linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
 <stop offset="0" stop-color="#7A4A1E"/><stop offset="1" stop-color="#5C3714"/>
</linearGradient>
<filter id="soft2"><feGaussianBlur stdDeviation="3"/></filter>
</defs>

<rect width="1920" height="1080" fill="url(#warm)"/>

<!-- sun glow top -->
<circle cx="960" cy="-160" r="560" fill="#FFD86B" opacity=".3" filter="url(#soft2)"/>

<!-- awning -->
<g>
 <rect x="0" y="0" width="1920" height="190" fill="#B23A48"/>
 <g fill="#F3E4CF">
  <rect x="120" y="0" width="120" height="190"/><rect x="360" y="0" width="120" height="190"/>
  <rect x="600" y="0" width="120" height="190"/><rect x="840" y="0" width="120" height="190"/>
  <rect x="1080" y="0" width="120" height="190"/><rect x="1320" y="0" width="120" height="190"/>
  <rect x="1560" y="0" width="120" height="190"/><rect x="1800" y="0" width="120" height="190"/>
 </g>
 <path d="M0,190 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 q60,46 120,0 L1920,120 L0,120Z"
   fill="#B23A48"/>
</g>

<!-- market table -->
<rect x="0" y="640" width="1920" height="90" fill="url(#table)"/>
<rect x="0" y="730" width="1920" height="350" fill="#4A2C10"/>

<!-- produce baskets: grains -->
