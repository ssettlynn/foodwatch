  <ellipse cx="1070" cy="578" rx="26" ry="18"/><ellipse cx="1040" cy="600" rx="24" ry="16"/><ellipse cx="985" cy="604" rx="24" ry="16"/></g>
 <g stroke="#1C7A42" stroke-width="3" fill="none">
  <path d="M948,585 q12,-8 24,0"/><path d="M1003,570 q12,-8 24,0"/><path d="M1058,578 q12,-8 24,0"/></g>
</g>
<!-- oranges -->
<g>
 <path d="M1260,640 a150,80 0 0 1 300,0Z" fill="#9C5A16"/>
 <g fill="#E6A817"><circle cx="1340" cy="590" r="19"/><circle cx="1390" cy="572" r="19"/><circle cx="1445" cy="567" r="19"/>
  <circle cx="1495" cy="580" r="19"/><circle cx="1420" cy="598" r="19"/><circle cx="1470" cy="602" r="18"/></g>
</g>
